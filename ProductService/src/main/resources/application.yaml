spring:
  application:
    name: ProductService

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: none
      open-in-view: false

    flyway:
      enabled: true
      baseline-on-migrate: true
      locations: classpath:db/migration

server:
    port: 8083
